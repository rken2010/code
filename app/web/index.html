<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAFAM Workflow App</title>
    <link rel="stylesheet" href="/web/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>RAFAM Workflow</h1>
      <div class="auth-box">
        <input id="xUser" placeholder="X-User" value="admin-demo" />
        <select id="xRole">
          <option value="admin">admin</option>
          <option value="compras">compras</option>
          <option value="tesoreria">tesoreria</option>
          <option value="lectura">lectura</option>
        </select>
      </div>
    </header>

    <main class="container">
      <section class="card">
        <h2>Dashboard</h2>
        <div class="kpi-grid">
          <div><span>Total</span><strong id="kpiTotal">-</strong></div>
          <div><span>Abiertos</span><strong id="kpiOpen">-</strong></div>
          <div><span>Cerrados</span><strong id="kpiClosed">-</strong></div>
          <div><span>Demorados</span><strong id="kpiOverdue">-</strong></div>
        </div>
        <button id="btnRefreshKpi">Refrescar KPIs</button>
      </section>

      <section class="card two-cols">
        <div>
          <h2>Proveedores</h2>
          <form id="providerForm">
            <input name="business_name" placeholder="Razón social" required />
            <input name="tax_id" placeholder="CUIT" />
            <input name="email" placeholder="Email" />
            <button type="submit">Crear proveedor</button>
          </form>
          <ul id="providerList"></ul>
        </div>

        <div>
          <h2>Suministros</h2>
          <form id="supplyForm">
            <input name="date" type="date" required />
            <input name="requester_dependency" placeholder="Dependencia" required />
            <input name="executing_unit" placeholder="Unidad ejecutora" required />
            <input name="title" placeholder="Título" required />
            <input name="description" placeholder="Observación" />
            <input name="provider_id" placeholder="ID proveedor (opcional)" type="number" />
            <button type="submit">Crear suministro</button>
          </form>
          <ul id="supplyList"></ul>
        </div>
      </section>

      <section class="card two-cols">
        <div>
          <h2>Memos</h2>
          <form id="memoForm">
            <input name="number" placeholder="Número" required />
            <input name="description" placeholder="Descripción" required />
            <input name="office" placeholder="Oficina" />
            <button type="submit">Crear memo</button>
          </form>
          <ul id="memoList"></ul>
        </div>

        <div>
          <h2>Tareas (Kanban)</h2>
          <form id="taskForm">
            <input name="title" placeholder="Título" required />
            <input name="description" placeholder="Descripción" />
            <input name="due_date" type="date" />
            <input name="supply_id" type="number" placeholder="ID suministro" />
            <input name="expediente_id" type="number" placeholder="ID expediente" />
            <button type="submit">Crear tarea</button>
          </form>
          <ul id="taskList"></ul>
        </div>
      </section>

      <section class="card">
        <h2>Links útiles</h2>
        <a href="/docs" target="_blank" rel="noreferrer">Abrir Swagger</a>
      </section>
    </main>

    <script src="/web/app.js"></script>
  </body>
</html>
